name: Continuous Integration

on:
  push:
    branches:
      - main
      - feature-pipeline

  pull_request:
    branches:
      - main

jobs:

  lint:
    name: Lint (Ruff)

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Ruff
        run: |
          ruff check .

  test:
    name: Testes (Pytest)

    needs: lint

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar testes
        run: |
          pytest

  soda:
    name: Data Quality (Soda Core)

    needs: test

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_DB: cnpj
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

        ports:
          - 5432:5432

        options: >-
          --health-cmd "pg_isready -U postgres -d cnpj"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar cliente PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Aguardar PostgreSQL
        env:
          PGPASSWORD: postgres
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Aguardando PostgreSQL..."
            sleep 2
          done

      - name: Criar tabelas de teste
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d cnpj <<EOF
          CREATE TABLE empresas (
            cnpj_basico VARCHAR(14),
            razao_social VARCHAR(255)
          );

          INSERT INTO empresas VALUES
          ('12345678000199','Empresa Teste');

          CREATE TABLE estabelecimentos (
            cnpj_basico VARCHAR(14)
          );

          INSERT INTO estabelecimentos VALUES
          ('12345678000199');
          EOF

      - name: Executar Soda Scan
        run: |
          soda scan -d postgres -c soda/configuration.yml soda/checks.yml

  build:
    name: Build da imagem

    needs: soda

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build da imagem
        run: |
          docker build -f ContainerFile -t fastapi-cnpj .